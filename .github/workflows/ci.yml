name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:

  # 🔹 Test + Lint (merged → faster feedback)
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]   # support range

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'   # caching

      - run: npm ci --ignore-scripts     # deterministic install (better than npm install)

      - run: npm run lint
      - run: npm test


  # 🔹 Code Quality Gate
  sonar:
    runs-on: ubuntu-latest
    needs: test   # only run if tests pass

    steps:
      - uses: actions/checkout@v3

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}  
        with:
          args: >
            -Dsonar.projectKey=sribalajimuruganandham_demo-ci-cd
            -Dsonar.organization=sribalajimuruganandham
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=.

            